<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Details Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            margin-top: 0;
            color: #333;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect width */
        }
        input:focus {
            border-color: #007bff;
            outline: none;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Agent Registration</h2>
    <form action="/submit-agent-details" method="POST">
        
        <div class="form-group">
            <label for="agentName">Full Name</label>
            <input type="text" id="agentName" name="agentName" placeholder="e.g. John Doe" required>
        </div>

        <div class="form-group">
            <label for="agentID">Agent ID / License Number</label>
            <input type="text" id="agentID" name="agentID" placeholder="AG-12345" required>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="agent@example.com" required>
        </div>

        <div class="form-group">
            <label for="specialty">Specialty</label>
            <select id="specialty" name="specialty">
                <option value="real-estate">Real Estate</option>
                <option value="insurance">Insurance</option>
                <option value="travel">Travel</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="experience">Years of Experience</label>
            <input type="number" id="experience" name="experience" min="0" max="50">
        </div>

        <div class="form-group">
            <label for="bio">Short Bio</label>
            <textarea id="bio" name="bio" rows="4" placeholder="Briefly describe your expertise..."></textarea>
        </div>

        <button type="submit">Register Agent</button>
    </form>
</div>

</body>
</html>
